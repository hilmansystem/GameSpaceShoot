<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Defender</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:linear-gradient(to bottom,#050816,#0f172a);
    font-family:Arial, sans-serif;
}

canvas{
    display:block;
}

#ui{
    position:absolute;
    top:15px;
    left:15px;
    color:white;
    font-size:24px;
    font-weight:bold;
    text-shadow:0 0 10px cyan;
}

#gameOver{
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,0.7);
    color:white;
}

#gameOver h1{
    font-size:60px;
    margin-bottom:20px;
    color:#ff4444;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#00d4ff;
    color:black;
    font-weight:bold;
    cursor:pointer;
    font-size:18px;
}
</style>
</head>
<body>

<div id="ui">Score: <span id="score">0</span></div>

<div id="gameOver">
    <h1>GAME OVER</h1>
    <button onclick="restartGame()">Main Lagi</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let gameRunning = true;

const keys = {};

document.addEventListener("keydown", e=>{
    keys[e.key]=true;
});

document.addEventListener("keyup", e=>{
    keys[e.key]=false;
});

class Star{
    constructor(){
        this.reset();
    }

    reset(){
        this.x=Math.random()*canvas.width;
        this.y=Math.random()*canvas.height;
        this.size=Math.random()*2;
        this.speed=Math.random()*2+1;
    }

    update(){
        this.y+=this.speed;
        if(this.y>canvas.height){
            this.y=0;
            this.x=Math.random()*canvas.width;
        }
    }

    draw(){
        ctx.fillStyle="white";
        ctx.fillRect(this.x,this.y,this.size,this.size);
    }
}

class Bullet{
    constructor(x,y){
        this.x=x;
        this.y=y;
        this.width=4;
        this.height=15;
        this.speed=10;
    }

    update(){
        this.y-=this.speed;
    }

    draw(){
        ctx.fillStyle="#00ffff";
        ctx.shadowBlur=15;
        ctx.shadowColor="#00ffff";
        ctx.fillRect(this.x,this.y,this.width,this.height);
        ctx.shadowBlur=0;
    }
}

class Enemy{
    constructor(){
        this.size=40;
        this.x=Math.random()*(canvas.width-this.size);
        this.y=-this.size;
        this.speed=2+Math.random()*3;
    }

    update(){
        this.y+=this.speed;
    }

    draw(){
        ctx.fillStyle="#ff4444";
        ctx.beginPath();
        ctx.moveTo(this.x+20,this.y);
        ctx.lineTo(this.x+40,this.y+40);
        ctx.lineTo(this.x,this.y+40);
        ctx.closePath();
        ctx.fill();
    }
}

class Particle{
    constructor(x,y){
        this.x=x;
        this.y=y;
        this.size=Math.random()*5+2;
        this.speedX=(Math.random()-0.5)*6;
        this.speedY=(Math.random()-0.5)*6;
        this.life=50;
    }

    update(){
        this.x+=this.speedX;
        this.y+=this.speedY;
        this.life--;
    }

    draw(){
        ctx.fillStyle=`rgba(255,165,0,${this.life/50})`;
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

const player={
    x:canvas.width/2,
    y:canvas.height-100,
    width:50,
    height:50,
    speed:7,

    draw(){
        ctx.fillStyle="#00ff88";

        ctx.beginPath();
        ctx.moveTo(this.x+25,this.y);
        ctx.lineTo(this.x+50,this.y+50);
        ctx.lineTo(this.x,this.y+50);
        ctx.closePath();
        ctx.fill();

        ctx.shadowBlur=20;
        ctx.shadowColor="#00ff88";
        ctx.fill();
        ctx.shadowBlur=0;
    }
};

const stars=[];
for(let i=0;i<200;i++){
    stars.push(new Star());
}

let bullets=[];
let enemies=[];
let particles=[];

setInterval(()=>{
    if(gameRunning){
        enemies.push(new Enemy());
    }
},1000);

let shootCooldown=false;

function shoot(){
    if(shootCooldown) return;

    bullets.push(
        new Bullet(player.x+23,player.y)
    );

    shootCooldown=true;
    setTimeout(()=>{
        shootCooldown=false;
    },180);
}

function collision(a,b){
    return(
        a.x < b.x+b.size &&
        a.x+a.width > b.x &&
        a.y < b.y+b.size &&
        a.y+a.height > b.y
    );
}

function createExplosion(x,y){
    for(let i=0;i<25;i++){
        particles.push(new Particle(x,y));
    }
}

function update(){

    if(!gameRunning) return;

    if(keys["ArrowLeft"] || keys["a"]){
        player.x-=player.speed;
    }

    if(keys["ArrowRight"] || keys["d"]){
        player.x+=player.speed;
    }

    if(keys[" "]){
        shoot();
    }

    player.x=Math.max(
        0,
        Math.min(canvas.width-player.width,player.x)
    );

    stars.forEach(s=>s.update());

    bullets.forEach((b,index)=>{
        b.update();

        if(b.y<0){
            bullets.splice(index,1);
        }
    });

    enemies.forEach((enemy,eIndex)=>{

        enemy.update();

        if(
            enemy.y+enemy.size >
            player.y &&
            enemy.x < player.x+player.width &&
            enemy.x+enemy.size > player.x
        ){
            gameOver();
        }

        bullets.forEach((bullet,bIndex)=>{

            if(collision(bullet,enemy)){

                createExplosion(
                    enemy.x+20,
                    enemy.y+20
                );

                bullets.splice(bIndex,1);
                enemies.splice(eIndex,1);

                score+=10;
                document.getElementById("score").textContent=score;
            }
        });

        if(enemy.y>canvas.height){
            enemies.splice(eIndex,1);
        }
    });

    particles.forEach((p,index)=>{
        p.update();

        if(p.life<=0){
            particles.splice(index,1);
        }
    });
}

function draw(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    stars.forEach(s=>s.draw());

    player.draw();

    bullets.forEach(b=>b.draw());

    enemies.forEach(e=>e.draw());

    particles.forEach(p=>p.draw());
}

function animate(){
    update();
    draw();
    requestAnimationFrame(animate);
}

function gameOver(){
    gameRunning=false;
    document.getElementById("gameOver").style.display="flex";
}

function restartGame(){

    score=0;
    bullets=[];
    enemies=[];
    particles=[];

    player.x=canvas.width/2;

    document.getElementById("score").textContent=0;
    document.getElementById("gameOver").style.display="none";

    gameRunning=true;
}

animate();

window.addEventListener("resize",()=>{
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
});
</script>

</body>
</html>
